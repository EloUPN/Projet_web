<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="header-container"></div>

<main>
    <form id="formConnexion">
        <div id="connexion-error" class="form-message form-message--error" hidden></div>

        <label for="emailConnexion">Email</label>
        <input type="email" id="emailConnexion" name="email" required autocomplete="email">

        <label for="mdpConnexion">Mot de passe</label>
        <input type="password" id="mdpConnexion" name="mdp" required autocomplete="current-password">

        <button type="submit">Se connecter</button>
    </form>

    <p>
        Pas encore de compte ?
        <a href="inscription.html">S’inscrire</a>
    </p>
</main>

<div id="footer-container"></div>

    <script src="./js/header.js"></script>
    <script src="./js/footer.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/connexion.js"></script>
    <script src="./js/animation.js"></script>

</body>
</html>
