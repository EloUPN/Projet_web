<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard Admin — Nylo</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="header-container"></div>

<main>

    <div class="dashboard-header">
        <div>
            <h2>Tableau de bord</h2>
            <p class="dashboard-subtitle">Gestion des réservations et du menu</p>
        </div>
        <span class="admin-badge">Administrateur</span>
    </div>

    <!-- Onglets -->
    <div class="dashboard-tabs" role="tablist">
        <button class="tab-btn active" role="tab" aria-selected="true"
                aria-controls="tab-reservations" data-tab="reservations">
            Réservations
        </button>
        <button class="tab-btn" role="tab" aria-selected="false"
                aria-controls="tab-menu" data-tab="menu">
            Menu
        </button>
    </div>

    <!-- ══ Onglet Réservations ══ -->
    <div id="tab-reservations" class="tab-content" role="tabpanel">

        <div class="dashboard-filters">
            <label for="filter-statut">Filtrer par statut :</label>
            <select id="filter-statut">
                <option value="">Tous les statuts</option>
                <option value="En attente">En attente</option>
                <option value="Validée">Validée</option>
                <option value="Annulée">Annulée</option>
                <option value="Refusée">Refusée</option>
            </select>
        </div>

        <div id="dashboard-reservations">
            <p class="dashboard-loading">Chargement des réservations…</p>
        </div>

    </div>

    <!-- ══ Onglet Menu ══ -->
    <div id="tab-menu" class="tab-content" role="tabpanel" hidden>

        <!-- Formulaire ajout / modification -->
        <div class="dashboard-menu-form-wrap">
            <h3 id="menu-form-title">Ajouter un élément</h3>
            <form id="formMenuItem" class="dashboard-form" novalidate>
                <input type="hidden" id="menu-item-id" value="">

                <div class="form-row">
                    <label for="menu-item-type">Catégorie</label>
                    <select id="menu-item-type" required>
                        <option value="entree">Entrée</option>
                        <option value="plat">Plat</option>
                        <option value="dessert">Dessert</option>
                        <option value="boisson">Boisson</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="menu-item-nom">Nom</label>
                    <input type="text" id="menu-item-nom" placeholder="Ex. : Nem de viandes" required>
                </div>

                <div class="form-row">
                    <label for="menu-item-prix">Prix (€)</label>
                    <input type="number" id="menu-item-prix" min="0" step="0.50"
                           placeholder="Ex. : 8.50" required>
                </div>

                <div class="dashboard-form-actions">
                    <button type="submit" id="menu-submit-btn" class="btn btn-sm">Ajouter</button>
                    <button type="button" id="menu-cancel-edit-btn" class="btn btn-sm btn-outline" hidden>
                        Annuler la modification
                    </button>
                </div>
            </form>
        </div>

        <!-- Liste des éléments -->
        <div id="dashboard-menu-items">
            <p class="dashboard-loading">Chargement du menu…</p>
        </div>

    </div>

</main>

<div id="footer-container"></div>

<script src="./js/header.js"></script>
<script src="./js/footer.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/animation.js"></script>
<script src="./js/dashboard.js"></script>

</body>
</html>
