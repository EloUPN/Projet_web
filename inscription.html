<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="header-container"></div>

<main>
    <form id="formInscription">
        <label for="nom">Nom</label><br>
        <input type="text" id="nom" name="nom" required><br><br>

        <label for="prenom">Prénom</label><br>
        <input type="text" id="prenom" name="prenom" required><br><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Mot de passe</label><br>
        <input type="password" id="password" name="password" minlength="6" required><br><br>

        <label for="confirmPassword">Confirmer le mot de passe</label><br>
        <input type="password" id="confirmPassword" name="confirmPassword" minlength="6" required><br><br>

        <button type="submit">S’inscrire</button>
    </form>

    <p>
        Déjà un compte ? <a href="connexion.html">Se connecter</a>
    </p>
</main>

<div id="footer-container"></div>

    <script src="./js/header.js"></script>
    <script src="./js/footer.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/inscription.js"></script>
    <script src="./js/animation.js"></script>

</body>
</html>
