<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Profil</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="header-container"></div>


<main>
    <!-- Conteneur pour afficher dynamiquement les infos utilisateur -->
    <div id="infosUser"></div>

    <!-- Conteneur pour afficher dynamiquement les réservations -->
    <div id="infosReservation">
        <h2>Mes Réservations</h2>
        <table id="reservationTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Heure</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Les réservations seront insérées ici dynamiquement -->
            </tbody>
        </table>
    </div>

    <!-- Bouton pour se déconnecter -->
    <button id="logoutBtn">Déconnexion</button>

    <!-- Lien vers les réservations (optionnel si tu veux garder un accès rapide) -->
    <!-- <a href="reservation.html">Mes réservations</a> -->
</main>

<div id="footer-container"></div>

    <script src="./js/header.js"></script>
    <script src="./js/footer.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/profil.js"></script>
    <script src="./js/animation.js"></script>

</body>
</html>
