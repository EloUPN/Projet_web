<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Réservation — Nylo</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="header-container"></div>

<main>
    <form id="formReservation">

        <label for="date">Date</label>
        <input type="date" id="date" name="date" required>

        <label>Horaire</label>
        <!-- Valeur transmise au serveur via ce champ caché -->
        <input type="hidden" id="heure" name="heure">
        <div id="time-picker" class="time-picker" role="group" aria-label="Choisir un horaire"></div>
        <p id="heure-error" class="field-error" hidden>Veuillez sélectionner un horaire.</p>

        <label for="personnes">Nombre de personnes</label>
        <input type="number" id="personnes" name="personnes" min="1" max="20" required>

        <label for="message">Message <span class="label-optional">(facultatif)</span></label>
        <input type="text" id="message" name="message" placeholder="Allergie, occasion spéciale…">

        <button type="submit">Réserver</button>
    </form>
</main>

<div id="footer-container"></div>

<script src="./js/header.js"></script>
<script src="./js/footer.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/reservation.js"></script>
<script src="./js/animation.js"></script>

</body>
</html>
