<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Réservation</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div id="header-container"></div>

<main>
    <form id="formReservation">
        <label for="date">Date :</label><br>
        <input type="date" id="date" name="date" required><br><br>

        <label for="heure">Heure (ouverture de 12:00 à 22:00) :</label><br>
        <input type="text" id="heure" name="heure" class="input-heure-hhmm" inputmode="numeric" autocomplete="off" placeholder="14:30" maxlength="5" spellcheck="false" required title="Format 24 h : HH:MM"><br><br>

        <label for="personnes">Nombre de personnes :</label><br>
        <input type="number" id="personnes" name="personnes" min="1" max="20" required><br><br>

        <label for="message">Message :</label><br>
        <input type="text" id="message" name="message"><br><br>

        <button type="submit">Réserver</button>
    </form>
</main>

<div id="footer-container"></div>

<script src="./js/header.js"></script>
<script src="./js/footer.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/reservation.js"></script>
<script src="./js/animation.js"></script>

</body>
</html>
